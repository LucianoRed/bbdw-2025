---
# Role: deploy-redis — deploy do Redis para o agent-ai
# Usa manifesto declarativo (oc apply) para garantir que as flags
# sejam aplicadas desde o início, evitando o problema de patches
# estratégicos com nome de container incorreto.
# Dados persistidos em PVC (1Gi) montado em /data com AOF habilitado.

- name: "Criar manifesto PVC do Redis"
  copy:
    dest: /tmp/redis-pvc.yaml
    content: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: redis-data
        namespace: {{ namespace }}
        labels:
          app: redis
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

- name: "Aplicar PVC Redis"
  command: "oc apply -f /tmp/redis-pvc.yaml -n {{ namespace }}"
  register: redis_pvc_apply
  changed_when: "'configured' in redis_pvc_apply.stdout or 'created' in redis_pvc_apply.stdout"

- name: "Criar manifesto Deployment do Redis"
  copy:
    dest: /tmp/redis-deployment.yaml
    content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: redis
        namespace: {{ namespace }}
        labels:
          app: redis
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: redis
        template:
          metadata:
            labels:
              app: redis
          spec:
            containers:
            - name: redis
              image: docker.io/redis/redis-stack-server:7.2.0-v19
              # IMPORTANTE: usar "redis-stack-server" (não "redis-server") como command.
              # O binário redis-stack-server é o wrapper da imagem que carrega os módulos
              # RediSearch, RedisJSON, etc. antes de iniciar o Redis.
              # Usar "redis-server" diretamente faz o Redis subir sem os módulos,
              # causando: ERR unknown command 'FT._LIST'
              #
              # Sem "command" explícito, o K8s não tem ENTRYPOINT para executar e trata
              # o primeiro elemento de "args" como executável — por isso definimos command.
              command: ["redis-stack-server"]
              args:
                - "--protected-mode"
                - "no"
                - "--appendonly"
                - "yes"
                - "--appendfsync"
                - "everysec"
              ports:
              - containerPort: 6379
                protocol: TCP
              - containerPort: 8001
                protocol: TCP
              volumeMounts:
              - name: redis-data
                mountPath: /data
            volumes:
            - name: redis-data
              persistentVolumeClaim:
                claimName: redis-data

- name: "Criar manifesto Service do Redis"
  copy:
    dest: /tmp/redis-service.yaml
    content: |
      apiVersion: v1
      kind: Service
      metadata:
        name: redis
        namespace: {{ namespace }}
        labels:
          app: redis
      spec:
        selector:
          app: redis
        ports:
        - name: redis
          port: 6379
          targetPort: 6379
          protocol: TCP
        - name: redis-insight
          port: 8001
          targetPort: 8001
          protocol: TCP

- name: "Aplicar Deployment Redis (oc apply garante idempotência)"
  command: "oc apply -f /tmp/redis-deployment.yaml -n {{ namespace }}"
  register: redis_deploy_apply
  changed_when: "'configured' in redis_deploy_apply.stdout or 'created' in redis_deploy_apply.stdout"

- name: "Aplicar Service Redis"
  command: "oc apply -f /tmp/redis-service.yaml -n {{ namespace }}"
  register: redis_svc_apply
  changed_when: "'configured' in redis_svc_apply.stdout or 'created' in redis_svc_apply.stdout"

- name: "Log do resultado do apply"
  debug:
    msg:
      - "PVC: {{ redis_pvc_apply.stdout }}"
      - "Deployment: {{ redis_deploy_apply.stdout }}"
      - "Service: {{ redis_svc_apply.stdout }}"

- name: "Aguardar Redis estar pronto"
  command: "oc rollout status deployment/redis -n {{ namespace }} --timeout=180s"
  changed_when: false

- name: "Verificar protected-mode desabilitado no pod em execução"
  shell: |
    POD=$(oc get pod -n {{ namespace }} -l app=redis --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
    if [ -n "$POD" ]; then
      echo "Pod Redis: $POD"
      oc exec "$POD" -n {{ namespace }} -- redis-cli CONFIG GET protected-mode
    else
      echo "Nenhum pod Redis running encontrado"
    fi
  register: redis_verify
  failed_when: false
  changed_when: false

- name: "Log da verificação do protected-mode"
  debug:
    msg: "{{ redis_verify.stdout_lines | default([]) }}"

- name: "Registrar informações do Redis"
  set_fact:
    redis_result:
      service: "redis.{{ namespace }}.svc.cluster.local"
      port: 6379
      pvc: "redis-data (1Gi, AOF habilitado)"
      status: "deployed"
