<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Matrículas</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M16 7l10 5-10 5L6 12z' fill='white'/%3E%3Cpath d='M6 12v7c0 2.5 4.5 5 10 5s10-2.5 10-5v-7l-10 5z' fill='white' opacity='.85'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --error: #ef4444;
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #e0e7ff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 15px rgba(99, 102, 241, 0.15);
            --shadow-lg: 0 10px 40px rgba(99, 102, 241, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-10px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        h1 i {
            margin-right: 12px;
            -webkit-text-fill-color: var(--primary);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 900px) {
            .grid {
                grid-template-columns: 420px 1fr;
                align-items: start;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 32px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 1s ease-out;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.25);
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 i {
            color: var(--primary);
            font-size: 1.3rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: white;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: scale(1.01);
        }

        input::placeholder {
            color: #94a3b8;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.97);
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            flex: 1;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        button[type="submit"]:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        button.secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        button.secondary:hover {
            background: var(--primary);
            color: white;
        }

        .status {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
            animation: slideIn 0.4s ease-out;
            font-weight: 500;
        }

        .status i {
            margin-right: 8px;
        }

        .status.ok {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid var(--success);
            color: #065f46;
        }

        .status.err {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid var(--error);
            color: #991b1b;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }

        .toolbar input {
            flex: 1;
        }

        .toolbar button {
            width: auto;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 24px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        th {
            text-align: left;
            padding: 16px;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:first-child {
            border-top-left-radius: 12px;
        }

        th:last-child {
            border-top-right-radius: 12px;
        }

        tbody tr {
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease-out;
        }

        tbody tr:hover {
            background: #f8fafc;
            transform: scale(1.01);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
            color: #475569;
        }

        tbody tr:last-child td:first-child {
            border-bottom-left-radius: 12px;
        }

        tbody tr:last-child td:last-child {
            border-bottom-right-radius: 12px;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .muted {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-top: 4px;
            font-style: italic;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            color: white;
        }

        .btn-remove {
            padding: 6px 10px;
            background: transparent;
            border: 1.5px solid var(--error);
            color: var(--error);
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-remove:hover {
            background: var(--error);
            color: white;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.3);
            width: 100%;
            max-width: 760px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 28px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h2 i {
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .modal-body {
            overflow-y: auto;
            padding: 20px 28px 28px;
        }

        .school-card {
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .school-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }

        .school-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .school-name {
            font-weight: 700;
            font-size: 1rem;
            color: #1e293b;
        }

        .school-bairro {
            font-size: 0.82rem;
            color: var(--primary);
            font-weight: 600;
            background: #ede9fe;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .school-info {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }

        .school-needs {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .badge-need {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            margin: 1px;
        }
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            margin: 1px;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i>Sistema de Matrículas</h1>
            <p class="subtitle">Gerencie matrículas dos anos 5º, 6º, 7º e 8º com facilidade</p>
            <button type="button" class="secondary" style="margin-top:16px;" onclick="abrirModalEscolas()">
                <i class="fas fa-school"></i> Ver Escolas
            </button>
        </div>

        <div class="grid">
            <div class="card">
                <h2><i class="fas fa-user-plus"></i> Nova Matrícula</h2>
                <form id="enrollForm">
                    <label for="name"><i class="fas fa-user"></i> Nome completo</label>
                    <input type="text" id="name" placeholder="Ex: Maria da Silva" autocomplete="name" required>

                    <label for="cpf"><i class="fas fa-id-card"></i> CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>

                    <div class="row">
                        <div>
                            <label for="dob"><i class="fas fa-calendar"></i> Data de nascimento</label>
                            <input type="text" id="dob" placeholder="DD/MM/AAAA" inputmode="numeric" required>
                        </div>
                        <div>
                            <label for="year"><i class="fas fa-book-open"></i> Ano</label>
                            <select id="year" required>
                                <option value="" selected disabled>Selecione o ano</option>
                                <option value="5">5º ano</option>
                                <option value="6">6º ano</option>
                                <option value="7">7º ano</option>
                                <option value="8">8º ano</option>
                            </select>
                            <div class="muted">Apenas anos: 5, 6, 7 e 8</div>
                        </div>
                    </div>

                    <label for="escola"><i class="fas fa-school"></i> Escola</label>
                    <select id="escola" required>
                        <option value="" selected disabled>Selecione uma escola</option>
                    </select>
                    <div id="escolaInfo" class="muted" style="margin-top:6px;display:none;"></div>

                    <div class="actions">
                        <button type="submit">
                            <i class="fas fa-check-circle"></i> Matricular
                        </button>
                        <button type="button" class="secondary" id="resetBtn">
                            <i class="fas fa-eraser"></i> Limpar
                        </button>
                    </div>

                    <div id="status" class="status"></div>
                </form>
            </div>

            <div class="card">
                <h2><i class="fas fa-users"></i> Alunos Matriculados</h2>
                <div class="toolbar">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar por nome...">
                    <button type="button" onclick="searchStudents()">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 50px;"><i class="fas fa-hashtag"></i> ID</th>
                                <th><i class="fas fa-user"></i> Nome</th>
                                <th style="width: 140px;"><i class="fas fa-id-card"></i> CPF</th>
                                <th style="width: 120px;"><i class="fas fa-birthday-cake"></i> Nasc.</th>
                                <th style="width: 80px;"><i class="fas fa-graduation-cap"></i> Ano</th>
                                <th><i class="fas fa-school"></i> Escola</th>
                                <th style="width: 60px;"></th>
                            </tr>
                        </thead>
                        <tbody id="studentsTable">
                            <!-- Dados serão inseridos aqui -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Escolas -->
    <div class="modal-overlay" id="modalEscolas" onclick="fecharModalEscolas(event)">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-school"></i> Escolas Disponíveis</h2>
                <button class="modal-close" onclick="document.getElementById('modalEscolas').classList.remove('open')" title="Fechar">&times;</button>
            </div>
            <div class="modal-body" id="modalEscolasBody">
                <!-- preenchido via JS -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/students';
        const SCHOOLS_API = '/api/schools';

        let schoolsMap = {}; // id -> escola

        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            
            if (value.length > 9) {
                e.target.value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else if (value.length > 6) {
                e.target.value = value.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
            } else if (value.length > 3) {
                e.target.value = value.replace(/(\d{3})(\d{0,3})/, '$1.$2');
            } else {
                e.target.value = value;
            }
        });

        // Mostrar info da escola ao selecionar
        document.getElementById('escola').addEventListener('change', function() {
            const id = parseInt(this.value);
            const infoEl = document.getElementById('escolaInfo');
            if (id && schoolsMap[id]) {
                const s = schoolsMap[id];
                const needs = s.necessidadesEspeciais.length
                    ? s.necessidadesEspeciais.map(n => `<span class="badge-need">${n}</span>`).join(' ')
                    : '<em>sem atendimento especializado listado</em>';
                infoEl.innerHTML = `<i class="fas fa-map-marker-alt"></i> ${s.endereco} &nbsp;|&nbsp; ${s.telefone}<br>Necessidades especiais: ${needs}`;
                infoEl.style.display = 'block';
            } else {
                infoEl.style.display = 'none';
            }
        });

        function showStatus(kind, message) {
            const el = document.getElementById('status');
            const icon = kind === 'ok' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            el.className = `status ${kind}`;
            el.innerHTML = icon + ' ' + message;
        }

        function formatYear(value) {
            const n = Number(value);
            if ([5,6,7,8].includes(n)) return `<span class="badge">${n}º ano</span>`;
            return String(value || '');
        }

        async function loadSchools() {
            try {
                const resp = await fetch(SCHOOLS_API);
                const schools = await resp.json();
                schoolsMap = {};
                schools.forEach(s => { schoolsMap[s.id] = s; });

                const sel = document.getElementById('escola');
                // agrupa por bairro
                const byBairro = {};
                schools.forEach(s => {
                    if (!byBairro[s.bairro]) byBairro[s.bairro] = [];
                    byBairro[s.bairro].push(s);
                });

                Object.keys(byBairro).sort().forEach(bairro => {
                    const group = document.createElement('optgroup');
                    group.label = bairro;
                    byBairro[bairro].forEach(s => {
                        const opt = document.createElement('option');
                        opt.value = s.id;
                        const tag = s.necessidadesEspeciais.length ? ` ★` : '';
                        opt.textContent = s.nome + tag;
                        group.appendChild(opt);
                    });
                    sel.appendChild(group);
                });
            } catch (err) {
                console.error('Erro ao carregar escolas:', err);
            }
        }

        async function loadStudents(query = '') {
            const url = query ? `${API_URL}?q=${encodeURIComponent(query)}` : API_URL;
            try {
                const response = await fetch(url);
                const students = await response.json();
                renderTable(students);
            } catch (error) {
                console.error('Erro ao carregar alunos:', error);
            }
        }

        function renderTable(students) {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = '';
            
            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 32px; color: #94a3b8;">Nenhum aluno matriculado</td></tr>';
                return;
            }
            
            students.forEach((student, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.05}s`;
                const escola = student.escola_id && schoolsMap[student.escola_id]
                    ? schoolsMap[student.escola_id].nome
                    : '<span style="color:#94a3b8;font-style:italic;">—</span>';
                tr.innerHTML = `
                    <td><strong>${student.id}</strong></td>
                    <td>${student.name}</td>
                    <td>${student.cpf || 'N/A'}</td>
                    <td>${student.dob}</td>
                    <td>${formatYear(student.year)}</td>
                    <td>${escola}</td>
                    <td><button type="button" class="btn-remove" title="Desmatricular" onclick="desmatricular(${student.id}, '${student.name.replace(/'/g, "\\'")}')"><i class="fas fa-user-minus"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('enrollForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const cpf = document.getElementById('cpf').value;
            const dob = document.getElementById('dob').value;
            const year = Number(document.getElementById('year').value);
            const escolaId = document.getElementById('escola').value;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Processando...';
            submitBtn.disabled = true;

            const payload = { name, cpf, dob, year };
            if (escolaId) payload.escola_id = parseInt(escolaId);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const escolaNome = escolaId && schoolsMap[parseInt(escolaId)]
                        ? ` na ${schoolsMap[parseInt(escolaId)].nome}` : '';
                    showStatus('ok', `Matrícula realizada com sucesso${escolaNome}!`);
                    document.getElementById('enrollForm').reset();
                    document.getElementById('escolaInfo').style.display = 'none';
                    await loadStudents();
                } else {
                    const payload2 = await response.json().catch(() => null);
                    showStatus('err', payload2?.error || 'Erro ao realizar matrícula.');
                }
            } catch (error) {
                console.error('Erro:', error);
                showStatus('err', 'Erro de rede ao realizar matrícula.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('enrollForm').reset();
            document.getElementById('escolaInfo').style.display = 'none';
            const el = document.getElementById('status');
            el.className = 'status';
            el.innerHTML = '';
        });

        function searchStudents() {
            const query = document.getElementById('searchInput').value;
            loadStudents(query);
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchStudents();
        });

        function abrirModalEscolas() {
            const body = document.getElementById('modalEscolasBody');
            body.innerHTML = '';
            const lista = Object.values(schoolsMap);
            if (!lista.length) {
                body.innerHTML = '<p style="color:#94a3b8;text-align:center;">Nenhuma escola carregada.</p>';
            } else {
                lista.forEach(s => {
                    const needs = s.necessidadesEspeciais.length
                        ? s.necessidadesEspeciais.map(n => `<span class="badge-need">${n}</span>`).join('')
                        : '<span style="color:#94a3b8;font-size:0.82rem;">Sem atendimento especializado listado</span>';
                    body.innerHTML += `
                        <div class="school-card">
                            <div class="school-card-header">
                                <div>
                                    <div class="school-name">${s.nome}</div>
                                    <div class="school-info"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${s.endereco} &nbsp;&bull;&nbsp; ${s.telefone}</div>
                                </div>
                                <span class="school-bairro">${s.bairro}</span>
                            </div>
                            <div class="school-needs">${needs}</div>
                        </div>`;
                });
            }
            document.getElementById('modalEscolas').classList.add('open');
        }

        function fecharModalEscolas(e) {
            if (e.target === document.getElementById('modalEscolas')) {
                document.getElementById('modalEscolas').classList.remove('open');
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('modalEscolas').classList.remove('open');
        });

        async function desmatricular(id, name) {
            if (!confirm(`Deseja cancelar a matrícula de ${name}?`)) return;
            try {
                const resp = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (resp.ok) {
                    showStatus('ok', `Matrícula de ${name} cancelada com sucesso.`);
                    await loadStudents();
                } else {
                    const data = await resp.json().catch(() => null);
                    showStatus('err', data?.error || 'Erro ao desmatricular.');
                }
            } catch (err) {
                showStatus('err', 'Erro de rede ao desmatricular.');
            }
        }

        // Carregar dados iniciais
        loadSchools().then(() => loadStudents());
    </script>
</body>
</html>
